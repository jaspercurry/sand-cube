schema_version = 1

[policy]
experiment_root = "experiments"
model_statuses = ["stable", "development", "released", "workbench", "archived"]
experiment_statuses = ["active", "promoted-support", "supporting", "study", "historical"]

# Primary models are the short, user-facing map of the repository. Generated
# output paths are allowed not to exist; source, entrypoint, and validation
# paths must exist and are checked by scripts/model_catalog.py.

[[models]]
id = "final-enclosure-200"
name = "Current 200 mm enclosure"
status = "stable"
kind = "enclosure"
source = "src/final_enclosure.py"
implementation = "experiments/sand_cube_8_5_black_hole/generate_contoured_inner_variants.py"
entrypoint = "scripts/generate_final_enclosure.py"
parameters = "experiments/sand_cube_8_5_black_hole/generate_contoured_inner_variants.py"
output = "build/sand_cube_200_wall_7_black_hole"
notes = "Stable API points to the 200 mm / 7 mm-wall FINAL_VARIANT; legacy folder names are not dimensions."

[[models]]
id = "final-system"
name = "Current enclosure, horn, and bracket assembly"
status = "stable"
kind = "system"
source = "scripts/generate_final_system_assembly.py"
entrypoint = "scripts/generate_final_system_assembly.py"
parameters = "params.py"
output = "build/final_system"

[[models]]
